version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: careerconnect_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: careerconnect_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/careerconnect
      - JWT_SECRET=super_secret_key_12345
      - JWT_REFRESH_SECRET=refresh_super_secret_key_54321
      - NODE_ENV=production
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: careerconnect_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
